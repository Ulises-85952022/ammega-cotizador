const GH_REPO = 'Ulises-85952022/ammega-cotizador';

function ghToken() { return localStorage.getItem('ammega_gh_token') || ''; }
function saveGhToken(t) { localStorage.setItem('ammega_gh_token', t); }

async function ghGetFile(token) {
  const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message || `GitHub ${r.status}`); }
  const info = await r.json();
  const content = decodeURIComponent(escape(atob(info.content.replace(/\n/g,''))));
  return { sha: info.sha, content };
}

async function ghPushFile(token, content, sha, message) {
  const encoded = btoa(unescape(encodeURIComponent(content)));
  const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
    method: 'PUT',
    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, content: encoded, sha })
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message || `GitHub ${r.status}`); }
  return r.json();
}

function parseXlsxFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        resolve(XLSX.utils.sheet_to_json(ws, { defval: '' }));
      } catch(err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function detectTipo(rows) {
  if (!rows.length) return 'unknown';
  const cols = Object.keys(rows[0]).map(c => String(c).toUpperCase());
  if (cols.some(c => c.includes('LISTA') || c.includes('BINASA') || c.includes('COSTO'))) return 'precios';
  if (cols.some(c => c.includes('DISPONIBLE') || c.includes('EXISTENCIA') || c.includes('STOCK'))) return 'inventario';
  return 'unknown';
}

function colVal(row, ...terms) {
  for (const [k, v] of Object.entries(row)) {
    const ku = String(k).toUpperCase();
    if (terms.some(t => ku.includes(t))) return v;
  }
  return null;
}

function applyInventario(catalog, rows) {
  const map = {};
  for (const row of rows) {
    const sku = String(colVal(row,'ARTICULO','CODIGO','CODE','ITEM') || '').trim();
    const stock = parseFloat(colVal(row,'DISPONIBLE','EXISTENCIA','STOCK','QTY') || 0) || 0;
    if (sku) map[sku] = (map[sku] || 0) + stock;
  }
  let updated = 0;
  const upd = arr => arr.map(p => {
    if (map.hasOwnProperty(p.id)) { updated++; return { ...p, stock: Math.round(map[p.id]) }; }
    return p;
  });
  return { catalog: { ...catalog, bandas: upd(catalog.bandas), mangueras: upd(catalog.mangueras) }, updated };
}

function applyPrecios(catalog, rows) {
  const map = {};
  for (const row of rows) {
    const sku = String(colVal(row,'ITEM','ARTICULO','CODIGO','CODE','SKU') || '').trim();
    const lista  = parseFloat(colVal(row,'LISTA','PRICE','PRECIO L') || 0) || null;
    const binasa = parseFloat(colVal(row,'BINASA','COSTO','COST','PRECIO B') || 0) || null;
    if (sku && (lista || binasa)) map[sku] = { lista, binasa };
  }
  let updated = 0;
  const upd = arr => arr.map(p => {
    if (map[p.id]) {
      updated++;
      const { lista, binasa } = map[p.id];
      return { ...p, ...(lista ? { precioLista: lista } : {}), ...(binasa ? { precioBinasa: binasa } : {}) };
    }
    return p;
  });
  return { catalog: { ...catalog, bandas: upd(catalog.bandas), mangueras: upd(catalog.mangueras) }, updated };
}

function serializeCatalog(cat) {
  const s = obj => JSON.stringify(obj, null, 2);
  return `// Catálogo actualizado desde panel admin — ${new Date().toISOString()}
window.CATALOG = ${s(cat.CATALOG)};

window.BACKORDERS = ${s(cat.BACKORDERS)};

window.EQUIVALENCIAS = ${s(cat.EQUIVALENCIAS)};
`;
}

function parseCatalogFromJs(jsContent) {
  const fake = {};
  try {
    const fn = new Function('window', jsContent);
    fn(fake);
  } catch(e) { throw new Error('No se pudo parsear data.js: ' + e.message); }
  if (!fake.CATALOG) throw new Error('data.js no tiene window.CATALOG');
  return fake;
}

/* ── Toast ───────────────────────────────────────────── */
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3000); return () => clearTimeout(t); }, []);
  return <div className="notif-toast">✅ {msg}</div>;
}

/* ── Empresas ────────────────────────────────────────── */
function EmpresasSection({ empresas, setEmpresas, usuarios, bos }) {
  const [selected, setSelected] = useState(empresas[0]);
  const [editing, setEditing] = useState(false);
  const [form, setForm]       = useState(null);
  const fileRef = useRef();

  const openEdit = e => { setForm({...e}); setEditing(true); };
  const saveEdit = () => { setEmpresas(prev => prev.map(e => e.id===form.id ? form : e)); setSelected(form); setEditing(false); };
  const F = ({ label, field, type='text' }) => (
    <div><label className="field-label">{label}</label>
      <input className="field-input" type={type} value={form[field]||''} onChange={e => setForm(f=>({...f,[field]:e.target.value}))} /></div>
  );

  const empUsers = selected ? usuarios.filter(u=>u.empresa===selected.id) : [];
  const empBos   = selected ? bos.filter(b=>b.empresa===selected.id) : [];

  return (
    <div className="content">
      <div style={{display:'grid',gridTemplateColumns:'280px 1fr',gap:22}}>
        {/* Lista */}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {empresas.map(e => (
            <div key={e.id} className={`empresa-card ${selected?.id===e.id?'selected':''}`} onClick={() => { setSelected(e); setEditing(false); }}>
              <div style={{width:46,height:46,borderRadius:10,background:e.color+'18',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,overflow:'hidden'}}>
                {e.logo ? <img src={e.logo} alt="" style={{width:'90%',objectFit:'contain',padding:2}} /> : <span style={{fontSize:20,fontWeight:800,color:e.color}}>{e.nombre[0]}</span>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:700,color:'var(--gray-900)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.nombre}</div>
                <div style={{fontSize:11,color:'var(--gray-400)',marginTop:1}}>{e.vendedores} vendedores · {e.cotizaciones} cots.</div>
                <div style={{marginTop:4}}><span className={`badge ${e.activa?'badge-green':'badge-gray'}`} style={{fontSize:10}}>{e.activa?'Activa':'Inactiva'}</span></div>
              </div>
            </div>
          ))}
        </div>

        {selected && (
          <div style={{display:'flex',gap:18}}>
            <div className="card" style={{flex:1}}>
              <div className="card-header">
                <div style={{flex:1}}><div className="card-title">{selected.nombre}</div><div className="card-sub">{selected.rfc}</div></div>
                {!editing && <button className="btn-secondary-web" onClick={()=>openEdit(selected)}>✏️ Editar</button>}
              </div>
              <div className="card-body">
                {!editing ? (
                  <div style={{display:'flex',flexDirection:'column',gap:20}}>
                    {/* Stats empresa */}
                    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
                      {[
                        { label:'Cotizaciones', val:selected.cotizaciones, icon:'📄', col:'var(--teal)' },
                        { label:'Vendedores activos', val:empUsers.filter(u=>u.status==='activo').length, icon:'👥', col:'var(--blue)' },
                        { label:'Back-orders activos', val:empBos.filter(b=>b.status!=='llegado').length, icon:'🔔', col:'var(--amber)' },
                        { label:'Ventas est.', val:fmt(selected.totalVentas), icon:'💰', col:'var(--green)' },
                      ].map(s => (
                        <div key={s.label} style={{background:'var(--gray-50)',borderRadius:10,padding:'12px 14px'}}>
                          <div style={{fontSize:18,marginBottom:4}}>{s.icon}</div>
                          <div style={{fontSize:18,fontWeight:800,color:s.col,lineHeight:1}}>{s.val}</div>
                          <div style={{fontSize:10,color:'var(--gray-400)',marginTop:3}}>{s.label}</div>

/* ── Usuarios ────────────────────────────────────────── */
const ROL_CONFIG = {
  Vendedor:   { badge:'role-vendedor',   icon:'🛒', desc:'Consulta catálogo, cotiza, back-orders',        perms:['catalogo','cotizar','backorders'] },
  Supervisor: { badge:'role-supervisor', icon:'👁',  desc:'Todo de Vendedor + equivalencias + admin precios', perms:['catalogo','cotizar','backorders','equivalencias','adminPrecios'] },
  Admin:      { badge:'role-admin',      icon:'⚙️',  desc:'Acceso completo al sistema',                  perms:['catalogo','cotizar','backorders','equivalencias','adminPrecios','adminUsuarios'] },
};

function UsuariosSection({ usuarios, setUsuarios, empresas }) {
  const [search, setSearch]       = useState('');
  const [showModal, setShowModal]  = useState(false);
  const [editUser, setEditUser]    = useState(null); // null = nuevo
  const [form, setForm]            = useState({ nombre:'', email:'', empresa:'binasa', rol:'Vendedor', permisos:{ catalogo:true,cotizar:true,backorders:false,equivalencias:false,adminPrecios:false } });
  const [linkCopied, setLinkCopied] = useState(null);
  const [toast, setToast]          = useState(null);
  const [filterRol, setFilterRol]  = useState('Todos');

  const filtered = usuarios.filter(u => {
    const q = search.toLowerCase();
    const matchQ = !q || u.nombre.toLowerCase().includes(q) || u.email.toLowerCase().includes(q);
    const matchR = filterRol==='Todos' || u.rol===filterRol;
    return matchQ && matchR;
  });

  const openNew  = () => { setEditUser(null); setForm({ nombre:'', email:'', empresa:'binasa', rol:'Vendedor', permisos:{catalogo:true,cotizar:true,backorders:false,equivalencias:false,adminPrecios:false} }); setShowModal(true); };
  const openEdit = u  => { setEditUser(u); setForm({...u}); setShowModal(true); };
  const save = () => {
    if (!form.nombre || !form.email) return;
    if (editUser) {
      setUsuarios(prev => prev.map(u => u.id===editUser.id ? {...u,...form} : u));
      setToast('Usuario actualizado correctamente');
    } else {
      setUsuarios(prev => [...prev, {...form, id:Date.now(), status:'pendiente', ultimoAcceso:'—', cotizaciones:0}]);
      setToast('Invitación enviada correctamente');
    }
    setShowModal(false);
  };
  const remove   = id => { setUsuarios(prev=>prev.filter(u=>u.id!==id)); setToast('Usuario eliminado'); };
  const toggleStatus = id => setUsuarios(prev=>prev.map(u=>u.id===id?{...u,status:u.status==='activo'?'inactivo':'activo'}:u));
  const revokeAccess = id => { setUsuarios(prev=>prev.map(u=>u.id===id?{...u,status:'cancelado'}:u)); setToast('Acceso cancelado'); };
  const copyLink = u => { setLinkCopied(u.id); setTimeout(()=>setLinkCopied(null),2000); setToast('Link de acceso copiado'); };

  const statusColor = { activo:'badge-green', inactivo:'badge-gray', pendiente:'badge-amber', cancelado:'badge-red' };
  const statusLabel = { activo:'● Activo', inactivo:'○ Inactivo', pendiente:'⏳ Pendiente', cancelado:'✕ Cancelado' };

  const PermToggle = ({ field, label }) => (
    <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',padding:'7px 0',borderBottom:'1px solid var(--gray-100)'}}>
      <label className="toggle"><input type="checkbox" checked={!!form.permisos?.[field]} onChange={e=>setForm(f=>({...f,permisos:{...f.permisos,[field]:e.target.checked}}))} /><span className="toggle-slider"/></label>
      <span style={{fontSize:13,color:'var(--gray-700)'}}>{label}</span>
    </label>
  );

  return (
    <div className="content">
      {toast && <div className="notif-toast">✅ {toast}</div>}
      {/* Roles info */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:20}}>
        {Object.entries(ROL_CONFIG).map(([rol,cfg])=>(
          <div key={rol} style={{background:'#fff',border:'1.5px solid var(--gray-200)',borderRadius:12,padding:'14px 16px',display:'flex',gap:12,alignItems:'flex-start'}}>
            <span style={{fontSize:22}}>{cfg.icon}</span>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                <span className={`role-chip ${cfg.badge}`}>{rol}</span>
                <span style={{fontSize:11,color:'var(--gray-400)'}}>{usuarios.filter(u=>u.rol===rol).length} usuarios</span>
              </div>
              <div style={{fontSize:11,color:'var(--gray-500)',lineHeight:1.5}}>{cfg.desc}</div>
            </div>
          </div>
        ))}
      </div>

      <div className="card">
        <div className="card-header">
          <div style={{flex:1}}><div className="card-title">Usuarios</div><div className="card-sub">{filtered.length} de {usuarios.length}</div></div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <div className="search-web"><span>🔍</span><input placeholder="Buscar…" value={search} onChange={e=>setSearch(e.target.value)} /></div>
            <select className="field-select" style={{width:'auto',padding:'7px 12px'}} value={filterRol} onChange={e=>setFilterRol(e.target.value)}>
              <option>Todos</option><option>Vendedor</option><option>Supervisor</option><option>Admin</option>
            </select>
            <button className="btn-primary-web" onClick={openNew}>+ Invitar usuario</button>
          </div>
        </div>
        <table className="data-table">
          <thead><tr><th>Usuario</th><th>Empresa</th><th>Rol</th><th>Estado</th><th>Último acceso</th><th>Cotizaciones</th><th>Acciones</th></tr></thead>
          <tbody>
            {filtered.map(u => {
              const emp = empresas.find(e=>e.id===u.empresa);
              return (
                <tr key={u.id}>
                  <td><div style={{display:'flex',alignItems:'center',gap:10}}>
                    <div className="avatar" style={{background:emp?.color||'var(--gray-300)',fontSize:13}}>{u.nombre[0]}</div>
                    <div><div style={{fontWeight:600,fontSize:13}}>{u.nombre}</div><div style={{fontSize:11,color:'var(--gray-400)'}}>{u.email}</div></div>
                  </div></td>
                  <td><div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:8,height:8,borderRadius:'50%',background:emp?.color||'var(--gray-300)',flexShrink:0}}/><span style={{fontSize:12}}>{emp?.nombre||'—'}</span></div></td>
                  <td><span className={`role-chip ${ROL_CONFIG[u.rol]?.badge||'badge-gray'}`}>{ROL_CONFIG[u.rol]?.icon} {u.rol}</span></td>
                  <td><span className={`badge ${statusColor[u.status]||'badge-gray'}`}>{statusLabel[u.status]||u.status}</span></td>
                  <td style={{fontSize:12,color:'var(--gray-400)'}}>{u.ultimoAcceso}</td>
                  <td style={{fontWeight:600,fontFamily:'var(--mono)'}}>{u.cotizaciones}</td>
                  <td><div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                    <button onClick={()=>openEdit(u)} style={{fontSize:11,padding:'4px 9px',border:'1px solid var(--gray-200)',borderRadius:6,background:'#fff',cursor:'pointer',fontFamily:'var(--font)',color:'var(--gray-600)'}}>✏️ Editar</button>
                    <button onClick={()=>copyLink(u)} style={{fontSize:11,padding:'4px 9px',border:'1px solid var(--gray-200)',borderRadius:6,background:linkCopied===u.id?'var(--green-light)':'#fff',color:linkCopied===u.id?'var(--green)':'var(--gray-600)',cursor:'pointer',fontFamily:'var(--font)',transition:'all .15s',whiteSpace:'nowrap'}}>
                      {linkCopied===u.id?'✓ Copiado':'🔗 Link'}
                    </button>
                    <label className="toggle" title={u.status==='activo'?'Desactivar':'Activar'}><input type="checkbox" checked={u.status==='activo'} onChange={()=>toggleStatus(u.id)} /><span className="toggle-slider"/></label>
                    {u.status!=='cancelado' && <button onClick={()=>revokeAccess(u.id)} style={{fontSize:11,padding:'4px 9px',border:'1px solid var(--red-light)',borderRadius:6,background:'#fff',cursor:'pointer',fontFamily:'var(--font)',color:'var(--red)'}}>Cancelar</button>}
                    <button onClick={()=>remove(u.id)} style={{fontSize:11,padding:'4px 9px',border:'1px solid var(--gray-200)',borderRadius:6,background:'#fff',cursor:'pointer',fontFamily:'var(--font)',color:'var(--red)'}}>🗑</button>
                  </div></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {showModal && (
        <div className="modal-backdrop" onClick={()=>setShowModal(false)}>
          <div className="modal modal-lg" onClick={e=>e.stopPropagation()}>
            <div className="modal-header"><div className="modal-title">{editUser?'Editar usuario':'Invitar nuevo usuario'}</div><button className="modal-close" onClick={()=>setShowModal(false)}>✕</button></div>
            <div className="modal-body">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
                <div style={{display:'flex',flexDirection:'column',gap:14}}>
                  <div><label className="field-label">Nombre completo</label><input className="field-input" value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))} /></div>
                  <div><label className="field-label">Correo electrónico</label><input className="field-input" type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} /></div>
                  <div><label className="field-label">Empresa</label>
                    <select className="field-select" value={form.empresa} onChange={e=>setForm(f=>({...f,empresa:e.target.value}))}>
                      {empresas.map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}
                    </select>
                  </div>
                  <div><label className="field-label">Rol</label>
                    <select className="field-select" value={form.rol} onChange={e=>{ const r=e.target.value; const def={catalogo:true,cotizar:true,backorders:r!=='Vendedor',equivalencias:r==='Supervisor'||r==='Admin',adminPrecios:r==='Supervisor'||r==='Admin'}; setForm(f=>({...f,rol:r,permisos:def})); }}>
                      <option>Vendedor</option><option>Supervisor</option><option>Admin</option>
                    </select>
                  </div>
                  <div style={{background:'var(--gray-50)',borderRadius:8,padding:'10px 12px',fontSize:12,color:'var(--gray-500)',lineHeight:1.5}}>
                    {ROL_CONFIG[form.rol]?.desc}
                  </div>
                </div>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:'var(--gray-700)',marginBottom:10}}>Permisos específicos</div>
                  <PermToggle field="catalogo" label="Ver catálogo de productos" />
                  <PermToggle field="cotizar" label="Generar cotizaciones" />
                  <PermToggle field="backorders" label="Solicitar back-orders" />
                  <PermToggle field="equivalencias" label="Ver equivalencias de competidores" />
                  <PermToggle field="adminPrecios" label="Ver precio de lista (costo)" />
                  {!editUser && (
                    <div style={{background:'var(--teal-light)',borderRadius:8,padding:'10px 12px',fontSize:12,color:'var(--teal-dark)',marginTop:14,display:'flex',gap:8}}>
                      <span>🔗</span><div>Se generará un link de acceso único válido 7 días. No requiere contraseña.</div>
                    </div>
                  )}
                </div>
              </div>
            </div>
            <div className="modal-footer"><button className="btn-secondary-web" onClick={()=>setShowModal(false)}>Cancelar</button><button className="btn-primary-web" onClick={save}>{editUser?'💾 Guardar':'📤 Enviar invitación'}</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Catálogo CSV ─────────────────────────────────────── */
function CatalogoSection({ uploads, setUploads }) {
  const [dragging, setDragging] = useState(false);
  const [status, setStatus]     = useState(null); // null | {phase,pct,msg} | {ok,updated,tipo,nombre} | {err}
  const [token, setToken]       = useState(ghToken());
  const [showToken, setShowToken] = useState(!ghToken());
  const fileRef = useRef();

  const saveToken = () => { saveGhToken(token); setShowToken(false); };

  const processFile = async (file) => {
    if (!ghToken() && !token) { setShowToken(true); return; }
    const tok = token || ghToken();
    try {
      setStatus({ phase: 'leyendo', pct: 10, msg: 'Leyendo archivo Excel…' });
      const rows = await parseXlsxFile(file);
      if (!rows.length) throw new Error('El archivo está vacío o no tiene datos.');

      const tipo = detectTipo(rows);
      if (tipo === 'unknown') throw new Error('No se reconocen las columnas. Revisa el formato requerido.');

      setStatus({ phase: 'descargando', pct: 35, msg: 'Descargando catálogo actual desde GitHub…' });
      const { sha, content } = await ghGetFile(tok);

      setStatus({ phase: 'procesando', pct: 60, msg: `Aplicando ${tipo === 'precios' ? 'lista de precios' : 'inventario'}…` });
      const cat = parseCatalogFromJs(content);
      const { catalog: newCat, updated } = tipo === 'precios'
        ? applyPrecios(cat.CATALOG, rows)
        : applyInventario(cat.CATALOG, rows);

      if (updated === 0) throw new Error('No se encontraron SKUs coincidentes. Verifica que los códigos del Excel coincidan con el catálogo.');

      setStatus({ phase: 'subiendo', pct: 80, msg: `Subiendo ${updated} productos actualizados a GitHub…` });
      const newContent = serializeCatalog({ ...cat, CATALOG: newCat });
      const fechaStr = new Date().toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'numeric' });
      await ghPushFile(tok, newContent, sha, `admin: actualizar ${tipo} — ${file.name} (${updated} registros) ${fechaStr}`);

      const entry = { id: Date.now(), nombre: file.name, tipo, fecha: fechaStr, registros: updated, empresa: 'todos', status: 'activo' };
      setUploads(p => [entry, ...p.slice(0,9)]);
      setStatus({ ok: true, updated, tipo, nombre: file.name });
    } catch(e) {
      setStatus({ err: e.message });
    }
  };

  const onDrop = (e) => { e.preventDefault(); setDragging(false); const f = e.dataTransfer.files[0]; if (f) processFile(f); };
  const onChange = (e) => { const f = e.target.files[0]; if (f) { processFile(f); e.target.value=''; } };

  const isLoading = status && status.phase;

  return (
    <div className="content">
      {/* Token config */}
      {showToken && (
        <div className="card" style={{marginBottom:20,borderLeft:'4px solid var(--amber)'}}>
          <div className="card-body">
            <div style={{fontWeight:700,fontSize:14,marginBottom:6}}>🔑 Configurar token de GitHub</div>
            <div style={{fontSize:13,color:'var(--gray-500)',marginBottom:12}}>
              Necesitas un <strong>Personal Access Token</strong> de GitHub con permiso <code>contents:write</code> en el repositorio.<br/>
              Créalo en: <strong>github.com → Settings → Developer settings → Personal access tokens → Fine-grained tokens</strong>
            </div>
            <div style={{display:'flex',gap:10}}>
              <input
                type="password"
                placeholder="github_pat_xxxx…"
                value={token}
                onChange={e=>setToken(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&saveToken()}
                style={{flex:1,border:'1.5px solid var(--gray-200)',borderRadius:8,padding:'9px 12px',fontSize:13,fontFamily:'var(--mono)'}}
              />
              <button className="btn-primary-web" onClick={saveToken} disabled={!token.trim()}>Guardar</button>
              {ghToken() && <button className="btn-secondary-web" onClick={()=>setShowToken(false)}>Cancelar</button>}
            </div>
          </div>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'1fr 340px',gap:22}}>
        <div style={{display:'flex',flexDirection:'column',gap:20}}>

          {/* Upload card */}
          <div className="card">
            <div className="card-header">
              <div>
                <div className="card-title">Subir archivo Excel / CSV</div>
                <div className="card-sub">Precios o inventario · xlsx, csv · actualiza el catálogo en vivo</div>
              </div>
              {ghToken() && (
                <button className="btn-secondary-web" style={{marginLeft:'auto'}} onClick={()=>setShowToken(true)}>🔑 Token</button>
              )}
            </div>
            <div className="card-body">
              <div
                className={`upload-zone ${dragging?'dragover':''} ${isLoading?'disabled':''}`}
                onDragOver={e=>{e.preventDefault();setDragging(true);}}
                onDragLeave={()=>setDragging(false)}
                onDrop={onDrop}
                onClick={()=>!isLoading&&fileRef.current?.click()}
                style={{cursor:isLoading?'not-allowed':'pointer',opacity:isLoading?.5:1}}
              >
                <div style={{fontSize:38,marginBottom:8}}>{isLoading?'⏳':'📂'}</div>
                <div style={{fontSize:15,fontWeight:600,color:'var(--gray-700)',marginBottom:4}}>
                  {isLoading?'Procesando…':'Arrastra tu archivo aquí'}
                </div>
                <div style={{fontSize:13,color:'var(--gray-400)',marginBottom:12}}>
                  {isLoading?status.msg:'o haz clic para seleccionar'}
                </div>
                {!isLoading && <button className="btn-secondary-web" style={{margin:'0 auto'}}>Seleccionar archivo</button>}
                <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={onChange} />
              </div>

              {/* Progress bar */}
              {isLoading && (
                <div style={{marginTop:14}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                    <span style={{fontSize:13,color:'var(--gray-700)',fontWeight:500}}>{status.msg}</span>
                    <span style={{fontSize:13,fontWeight:700,color:'var(--teal)'}}>{status.pct}%</span>
                  </div>
                  <div style={{height:8,background:'var(--gray-200)',borderRadius:4,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${status.pct}%`,background:'var(--teal)',borderRadius:4,transition:'width .4s'}} />
                  </div>
                </div>
              )}

              {/* Success */}
              {status?.ok && (
                <div style={{marginTop:14,background:'var(--green-light)',borderRadius:10,padding:'14px 16px',display:'flex',alignItems:'center',gap:12}}>
                  <span style={{fontSize:24}}>✅</span>
                  <div>
                    <div style={{fontWeight:700,fontSize:14,color:'#15803d'}}>¡Catálogo actualizado!</div>
                    <div style={{fontSize:13,color:'#166534',marginTop:2}}>
                      <strong>{status.updated}</strong> productos de {status.tipo === 'precios' ? 'precios' : 'inventario'} actualizados · <em>{status.nombre}</em>
                    </div>
                    <div style={{fontSize:12,color:'#166534',marginTop:4}}>Vercel redesplegará en ~1 minuto. El cotizador ya tendrá los datos nuevos.</div>
                  </div>
                  <button style={{marginLeft:'auto',background:'none',border:'none',cursor:'pointer',fontSize:18,color:'#15803d'}} onClick={()=>setStatus(null)}>✕</button>
                </div>
              )}

              {/* Error */}
              {status?.err && (
                <div style={{marginTop:14,background:'var(--red-light)',borderRadius:10,padding:'14px 16px',display:'flex',alignItems:'center',gap:12}}>
                  <span style={{fontSize:24}}>❌</span>
                  <div>
                    <div style={{fontWeight:700,fontSize:14,color:'var(--red)'}}>Error al procesar</div>
                    <div style={{fontSize:13,color:'var(--red)',marginTop:2}}>{status.err}</div>
                    {status.err.includes('token') || status.err.includes('401') || status.err.includes('403') ? (
                      <button style={{marginTop:6,fontSize:12,color:'var(--teal)',background:'none',border:'none',cursor:'pointer',padding:0,textDecoration:'underline'}} onClick={()=>{setShowToken(true);setStatus(null);}}>Configurar token</button>
                    ) : null}
                  </div>
                  <button style={{marginLeft:'auto',background:'none',border:'none',cursor:'pointer',fontSize:18,color:'var(--red)'}} onClick={()=>setStatus(null)}>✕</button>
                </div>
              )}
            </div>
          </div>

          {/* Historial */}
          {uploads.length > 0 && (
            <div className="card">
              <div className="card-header"><div className="card-title">Historial de actualizaciones</div></div>
              <table className="data-table">
                <thead><tr><th>Archivo</th><th>Tipo</th><th>Registros</th><th>Fecha</th></tr></thead>
                <tbody>{uploads.map(u=>(
                  <tr key={u.id}>
                    <td><div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:16}}>📊</span><div style={{fontSize:12,fontWeight:600}}>{u.nombre}</div></div></td>
                    <td><span className={`badge ${u.tipo==='precios'?'badge-purple':'badge-blue'}`}>{u.tipo==='precios'?'💰 Precios':'📦 Inventario'}</span></td>
                    <td style={{fontWeight:600,fontFamily:'var(--mono)',fontSize:12}}>{u.registros.toLocaleString()}</td>
                    <td style={{fontSize:12,color:'var(--gray-400)'}}>{u.fecha}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          )}
        </div>

        {/* Formato */}
        <div className="card" style={{height:'fit-content'}}>
          <div className="card-header"><div className="card-title">Formato requerido</div></div>
          <div className="card-body" style={{display:'flex',flexDirection:'column',gap:16}}>
            {[{label:'💰 Lista de precios',color:'var(--purple)',cols:['Item','Description','Clase','Grupo','P.Lista','P.Binasa'],rows:[['AX34','BANDA A-34','BANDA','B.CL','185.20','101.86'],['JSH4-06','MANG. R1 3/8"','Mang','HIDR','185.60','102.08']]},
              {label:'📦 Inventario',color:'var(--blue)',cols:['Articulo','Descripcion','Almacen','Disponible','Unidad'],rows:[['AX34','BANDA A-34','1','62','pz'],['JSH4-06','MANG R1 3/8"','2','420','mt']]}
            ].map(t=>(
              <div key={t.label}>
                <div style={{fontSize:12,fontWeight:700,color:t.color,marginBottom:7}}>{t.label}</div>
                <div style={{background:'var(--gray-50)',borderRadius:7,overflow:'hidden',border:'1px solid var(--gray-200)'}}>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:10}}>
                    <thead><tr style={{background:t.color}}>{t.cols.map(h=><td key={h} style={{padding:'4px 7px',color:'#fff',fontWeight:700,fontSize:9}}>{h}</td>)}</tr></thead>
                    <tbody>{t.rows.map((r,i)=><tr key={i} style={{borderTop:'1px solid var(--gray-100)'}}>{r.map((c,j)=><td key={j} style={{padding:'4px 7px',fontFamily:j<2?'var(--mono)':'var(--font)',fontSize:9,color:'var(--gray-600)'}}>{c}</td>)}</tr>)}</tbody>
                  </table>
                </div>
              </div>
            ))}
            <div style={{background:'var(--amber-light)',borderRadius:8,padding:'10px 12px',fontSize:12,color:'var(--amber)',marginTop:4}}>
              ⚠️ La columna de código (Item/Articulo) debe coincidir exactamente con los SKUs del catálogo.
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Back-orders Admin ────────────────────────────────── */
function BackordersAdmin({ bos, setBos, empresas, usuarios }) {
  const [filter,setFilter]=useState('todos');
  const [editBO,setEditBO]=useState(null);
  const [toast,setToast]=useState(null);
  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null),3000); };

  const statusMap = { pendiente:{label:'Pendiente',badge:'badge-amber',icon:'⏳'}, en_camino:{label:'En camino',badge:'badge-blue',icon:'🚚'}, llegado:{label:'Llegó',badge:'badge-green',icon:'✅'} };
  const filtered = bos.filter(b=>filter==='todos'||b.status===filter);

  const cambiarStatus = (id, status) => { setBos(prev=>prev.map(b=>b.id===id?{...b,status}:b)); showToast(`Back-order actualizado a "${statusMap[status].label}"`); };
  const sendNotif  = bo => showToast(`Notificación enviada a ${bo.vendedor} — "${bo.desc}" disponible`);

  const exportCSV = () => {
    const rows = [['ID','Producto','Descripcion','Empresa','Vendedor','Cliente','Cantidad','Unidad','Fecha','Estimado','Status']];
    bos.forEach(b=>rows.push([b.id,b.producto,b.desc,b.empresa,b.vendedor,b.cliente,b.cantidad,b.unidad,b.fecha,b.estimado||'—',b.status]));
    const csv = rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
    const blob = new Blob([csv],{type:'text/csv'});
    const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='backorders.csv'; a.click();
    showToast('Archivo Excel descargado');
  };

  return (
    <div className="content">
      {toast && <div className="notif-toast">{toast}</div>}
      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:20}}>
        {[{label:'Pendientes',status:'pendiente',color:'var(--amber)',bg:'var(--amber-light)',icon:'⏳'},{label:'En camino',status:'en_camino',color:'var(--blue)',bg:'var(--blue-light)',icon:'🚚'},{label:'Llegados',status:'llegado',color:'var(--green)',bg:'var(--green-light)',icon:'✅'}].map(m=>(
          <div key={m.label} style={{background:m.bg,borderRadius:12,padding:'14px 18px',cursor:'pointer',border:`1.5px solid ${filter===m.status?m.color:'transparent'}`,transition:'border-color .15s'}} onClick={()=>setFilter(f=>f===m.status?'todos':m.status)}>
            <div style={{fontSize:22,marginBottom:4}}>{m.icon}</div>
            <div style={{fontSize:26,fontWeight:800,color:m.color,lineHeight:1}}>{bos.filter(b=>b.status===m.status).length}</div>
            <div style={{fontSize:12,color:m.color,marginTop:3,fontWeight:600}}>{m.label}</div>
          </div>
        ))}
      </div>

      <div className="card">
        <div className="card-header">
          <div style={{flex:1}}><div className="card-title">Back-orders {filter!=='todos'?`· ${statusMap[filter]?.label}`:''}</div><div className="card-sub">{filtered.length} registros</div></div>
          <button className="btn-secondary-web" onClick={exportCSV}>📥 Exportar Excel</button>
        </div>
        <table className="data-table">
          <thead><tr><th>ID</th><th>Producto</th><th>Empresa · Vendedor</th><th>Cliente</th><th>Cant.</th><th>F. Solicitud</th><th>F. Estimada</th><th>Estado</th><th>Acciones</th></tr></thead>
          <tbody>
            {filtered.map(bo=>{
              const emp=empresas.find(e=>e.id===bo.empresa);
              return (
                <tr key={bo.id}>
                  <td style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--gray-400)'}}>{bo.id}</td>
                  <td><div style={{fontSize:11,fontFamily:'var(--mono)',color:'var(--teal)',marginBottom:2}}>{bo.producto}</div><div style={{fontSize:12,color:'var(--gray-700)'}}>{bo.desc}</div></td>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
                      <div style={{width:8,height:8,borderRadius:'50%',background:emp?.color||'var(--gray-300)',flexShrink:0}}/>
                      <span style={{fontSize:12,fontWeight:600}}>{emp?.nombre||bo.empresa}</span>
                    </div>
                    <div style={{fontSize:11,color:'var(--gray-400)'}}>{bo.vendedor}</div>
                  </td>
                  <td style={{fontSize:12,fontWeight:500}}>{bo.cliente}</td>
                  <td style={{fontWeight:700,fontFamily:'var(--mono)',fontSize:12}}>{bo.cantidad} {bo.unidad}</td>
                  <td style={{fontSize:11,color:'var(--gray-400)'}}>{bo.fecha}</td>
                  <td>
                    {editBO===bo.id
                      ? <input className="field-input" type="date" defaultValue={bo.estimado} style={{width:130,fontSize:12,padding:'4px 8px'}}
                          onChange={e=>setBos(prev=>prev.map(b=>b.id===bo.id?{...b,estimado:e.target.value}:b))}
                          onBlur={()=>{ setEditBO(null); showToast('Fecha estimada actualizada'); }} autoFocus />
                      : <button onClick={()=>setEditBO(bo.id)} style={{fontSize:11,padding:'4px 10px',border:'1px solid var(--gray-200)',borderRadius:6,background:'#fff',cursor:'pointer',fontFamily:'var(--font)',color:bo.estimado?'var(--gray-700)':'var(--amber)',whiteSpace:'nowrap'}}>
                          {bo.estimado||'+ Fecha est.'} ✏️
                        </button>
                    }
                  </td>
                  <td><span className={`badge ${statusMap[bo.status]?.badge}`}>{statusMap[bo.status]?.icon} {statusMap[bo.status]?.label}</span></td>
                  <td><div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                    {bo.status==='pendiente' && <button className="btn-secondary-web" style={{padding:'4px 10px',fontSize:11}} onClick={()=>cambiarStatus(bo.id,'en_camino')}>🚚 En camino</button>}
                    {bo.status==='en_camino' && <button className="btn-primary-web" style={{padding:'4px 10px',fontSize:11}} onClick={()=>cambiarStatus(bo.id,'llegado')}>✅ Surtido</button>}
                    {(bo.status==='en_camino'||bo.status==='llegado') && <button onClick={()=>sendNotif(bo)} style={{fontSize:11,padding:'4px 10px',border:'1px solid var(--teal)',borderRadius:6,background:'var(--teal-light)',cursor:'pointer',fontFamily:'var(--font)',color:'var(--teal)',whiteSpace:'nowrap'}}>🔔 Notificar</button>}
                  </div></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── Equivalencias ────────────────────────────────────── */
function EquivalenciasSection() {
  const [items,setItems]=useState(INIT_EQ);
  const [tab,setTab]=useState('Todos');
  const [search,setSearch]=useState('');
  const [showNew,setShowNew]=useState(false);
  const [newItem,setNewItem]=useState({competidor:'Gates',ref:'',descripcion:'',equivalente:'',marca:'Megadyne',tipo:'Bandas'});
  const [toast,setToast]=useState(null);

  const tabs=['Todos','Bandas','Mangueras'];
  const compColor={Gates:'badge-red',Optibelt:'badge-amber',Parker:'badge-blue','SKF':'badge-purple',Dunlop:'badge-gray'};

  const filtered = items.filter(i=>{
    const q=search.toLowerCase();
    const matchTab=tab==='Todos'||i.tipo===tab;
    const matchQ=!q||i.ref.toLowerCase().includes(q)||i.competidor.toLowerCase().includes(q)||i.descripcion.toLowerCase().includes(q)||i.equivalente.toLowerCase().includes(q);
    return matchTab&&matchQ;
  });

  const add=()=>{ if(!newItem.ref||!newItem.equivalente)return; setItems(p=>[...p,{...newItem}]); setShowNew(false); setNewItem({competidor:'Gates',ref:'',descripcion:'',equivalente:'',marca:'Megadyne',tipo:'Bandas'}); setToast('Equivalencia agregada'); setTimeout(()=>setToast(null),3000); };
  const del=i=>{ setItems(p=>p.filter((_,j)=>j!==i)); setToast('Equivalencia eliminada'); setTimeout(()=>setToast(null),3000); };

  return (
    <div className="content">
      {toast && <div className="notif-toast">✅ {toast}</div>}
      {/* Catálogos por tipo */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
        {[{marca:'Megadyne',tipo:'Bandas',icon:'🔧',color:'var(--teal)',desc:'Bandas de transmisión · Dentadas · Métricas · Clásicas',count:items.filter(i=>i.marca==='Megadyne').length,logo:'megadyne-logo.png'},
          {marca:'Jasson',tipo:'Mangueras',icon:'🌊',color:'var(--amber)',desc:'Mangueras hidráulicas · Industriales · SAE 100R1/R2',count:items.filter(i=>i.marca==='Jasson').length,logo:'jasson-logo.png'}
        ].map(cat=>(
          <div key={cat.marca} style={{background:'#fff',border:`2px solid ${tab===cat.tipo?cat.color:'var(--gray-200)'}`,borderRadius:14,padding:'16px 20px',cursor:'pointer',transition:'border-color .15s,box-shadow .15s',boxShadow:tab===cat.tipo?`0 0 0 3px ${cat.color}22`:''}} onClick={()=>setTab(t=>t===cat.tipo?'Todos':cat.tipo)}>
            <div style={{display:'flex',alignItems:'center',gap:14}}>
              <div style={{width:52,height:52,borderRadius:12,background:cat.color+'18',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,overflow:'hidden'}}>
                <img src={cat.logo} alt="" style={{width:'85%',objectFit:'contain',padding:2}} />
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:'var(--gray-900)',marginBottom:3}}>{cat.marca} — {cat.tipo}</div>
                <div style={{fontSize:11,color:'var(--gray-500)',marginBottom:6}}>{cat.desc}</div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:22,fontWeight:800,color:cat.color}}>{cat.count}</span>
                  <span style={{fontSize:11,color:'var(--gray-400)'}}>equivalencias registradas</span>
                </div>
              </div>
              {tab===cat.tipo && <span style={{fontSize:20,color:cat.color}}>●</span>}
            </div>
          </div>
        ))}
      </div>

      <div className="card">
        <div className="card-header">
          <div style={{flex:1}}><div className="card-title">Cross-reference {tab!=='Todos'?`· ${tab}`:''}</div><div className="card-sub">{filtered.length} referencias</div></div>
          <div className="search-web"><span>🔍</span><input placeholder="Buscar referencia…" value={search} onChange={e=>setSearch(e.target.value)} /></div>
          <button className="btn-primary-web" onClick={()=>setShowNew(v=>!v)}>+ Agregar</button>
        </div>

        {/* Tabs */}
        <div style={{padding:'0 22px'}}>
          <div className="tabs-web">
            {tabs.map(t=><button key={t} className={`tab-web ${tab===t?'active':''}`} onClick={()=>setTab(t)}>{t==='Bandas'?'🔧 ':t==='Mangueras'?'🌊 ':''}{t} {t!=='Todos'?`(${items.filter(i=>t==='Todos'||i.tipo===t).length})`:''}</button>)}
          </div>
        </div>

        <table className="data-table">
          <thead><tr><th>Competidor</th><th>Ref. competidor</th><th>Descripción</th><th>SKU Binasa</th><th>Marca</th><th>Tipo</th><th></th></tr></thead>
          <tbody>
            {filtered.map((item,i)=>(
              <tr key={i}>
                <td><span className={`badge ${compColor[item.competidor]||'badge-gray'}`}>{item.competidor}</span></td>
                <td style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600}}>{item.ref}</td>
                <td style={{fontSize:13}}>{item.descripcion}</td>
                <td style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--teal)',fontWeight:600}}>{item.equivalente}</td>
                <td><span className={`badge ${item.marca==='Megadyne'?'badge-teal':'badge-amber'}`}>{item.marca}</span></td>
                <td><span className="badge badge-gray">{item.tipo}</span></td>
                <td><button style={{fontSize:11,padding:'4px 8px',border:'1px solid var(--gray-200)',borderRadius:6,background:'#fff',cursor:'pointer',color:'var(--red)',fontFamily:'var(--font)'}} onClick={()=>del(items.indexOf(item))}>🗑</button></td>
              </tr>
            ))}
          </tbody>
        </table>

        {showNew && (
          <div style={{padding:'14px 22px',borderTop:'1px solid var(--gray-100)',background:'var(--gray-50)'}}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr) auto',gap:10,alignItems:'flex-end'}}>
              {[{l:'Competidor',f:'competidor',sel:['Gates','Optibelt','Parker','SKF','Dunlop']},{l:'Tipo',f:'tipo',sel:['Bandas','Mangueras']},{l:'Ref. competidor',f:'ref'},{l:'Descripción',f:'descripcion'},{l:'SKU Binasa',f:'equivalente'},{l:'Marca',f:'marca',sel:['Megadyne','Jasson']}].map(fld=>(
                <div key={fld.f}><label className="field-label">{fld.l}</label>
                  {fld.sel
                    ? <select className="field-select" value={newItem[fld.f]} onChange={e=>setNewItem(n=>({...n,[fld.f]:e.target.value}))}>{fld.sel.map(o=><option key={o}>{o}</option>)}</select>
                    : <input className="field-input" value={newItem[fld.f]} onChange={e=>setNewItem(n=>({...n,[fld.f]:e.target.value}))} />
                  }
                </div>
              ))}
              <div style={{display:'flex',gap:6,paddingBottom:1}}>
                <button className="btn-primary-web" onClick={add}>Agregar</button>
                <button className="btn-secondary-web" onClick={()=>setShowNew(false)}>✕</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Root ─────────────────────────────────────────────── */
function App() {
  const [section,setSection]=useState('dashboard');
  const [empresas,setEmpresas]=useState(INIT_EMPRESAS);
  const [usuarios,setUsuarios]=useState(INIT_USUARIOS);
  const [uploads,setUploads]=useState(INIT_UPLOADS);
  const [bos,setBos]=useState(INIT_BO);
  const boPending = bos.filter(b=>b.status==='pendiente').length;

  const render=()=>{
    switch(section){
      case 'dashboard':    return <Dashboard empresas={empresas} usuarios={usuarios} uploads={uploads} bos={bos} onNav={setSection} />;
      case 'empresas':     return <EmpresasSection empresas={empresas} setEmpresas={setEmpresas} usuarios={usuarios} bos={bos} />;
      case 'usuarios':     return <UsuariosSection usuarios={usuarios} setUsuarios={setUsuarios} empresas={empresas} />;
      case 'catalogo':     return <CatalogoSection uploads={uploads} setUploads={setUploads} />;
      case 'backorders':   return <BackordersAdmin bos={bos} setBos={setBos} empresas={empresas} usuarios={usuarios} />;
      case 'equivalencias':return <EquivalenciasSection />;
      default: return null;
    }
  };

  return (
    <>
      <Sidebar section={section} onSection={setSection} boPending={boPending} />
      <div className="main"><TopbarWeb section={section} />{render()}</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
