<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotizador Ammega — B2B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --teal: #1a7a78;
    --teal-dark: #0f5a58;
    --teal-light: #e8f5f5;
    --teal-mid: #2a9896;
    --amber: #d97706;
    --amber-light: #fef3c7;
    --red: #dc2626;
    --red-light: #fee2e2;
    --green: #16a34a;
    --green-light: #dcfce7;
    --gray-50: #f8f9fa;
    --gray-100: #f1f3f4;
    --gray-200: #e8eaed;
    --gray-300: #dadce0;
    --gray-400: #bdc1c6;
    --gray-500: #9aa0a6;
    --gray-600: #80868b;
    --gray-700: #5f6368;
    --gray-800: #3c4043;
    --gray-900: #202124;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-lg: 16px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow: 0 4px 12px rgba(0,0,0,.1), 0 2px 4px rgba(0,0,0,.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.14), 0 4px 8px rgba(0,0,0,.08);
  }
  html, body { height: 100%; overflow: hidden; background: #1a1a2e; font-family: var(--font); }
  #root { height: 100%; display: flex; align-items: center; justify-content: center; }

  /* App shell */
  .app-bg {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 30% 20%, #0f3d3c 0%, #1a1a2e 60%);
    position: relative; overflow: hidden;
  }
  .app-bg::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 70% 80%, rgba(26,122,120,.15) 0%, transparent 60%);
    pointer-events: none;
  }
  .brand-watermark {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    opacity: .15; user-select: none; pointer-events: none;
    font-size: 11px; font-weight: 600; letter-spacing: 3px; color: #fff; text-transform: uppercase;
  }

  /* Screen container */
  .screen { width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; background: var(--gray-50); }

  /* Topbar */
  .topbar {
    padding: 12px 16px 10px;
    background: #fff;
    border-bottom: 1px solid var(--gray-200);
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .topbar-logo { height: 24px; }
  .topbar-title { font-size: 16px; font-weight: 700; color: var(--teal-dark); }
  .topbar-sub { font-size: 11px; color: var(--gray-500); margin-top: 1px; }
  .topbar-spacer { flex: 1; }
  .topbar-btn {
    width: 36px; height: 36px; border-radius: 50%; border: none;
    background: var(--gray-100); display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--gray-700); font-size: 16px;
    transition: background .15s;
  }
  .topbar-btn:active { background: var(--gray-200); }
  .topbar-back {
    width: 32px; height: 32px; border-radius: 50%; border: none;
    background: var(--gray-100); display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--gray-700); font-size: 18px; flex-shrink: 0;
    transition: background .15s;
  }

  /* Bottom nav */
  .bottom-nav {
    display: flex; background: #fff;
    border-top: 1px solid var(--gray-200);
    flex-shrink: 0; padding-bottom: 4px;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 8px 4px; cursor: pointer; border: none; background: none;
    transition: color .15s;
  }
  .nav-icon { font-size: 20px; margin-bottom: 2px; }
  .nav-label { font-size: 10px; font-weight: 500; letter-spacing: .3px; }
  .nav-item.active { color: var(--teal); }
  .nav-item:not(.active) { color: var(--gray-400); }

  /* Search bar */
  .search-wrap { padding: 10px 16px; background: #fff; border-bottom: 1px solid var(--gray-200); flex-shrink: 0; }
  .search-bar {
    display: flex; align-items: center; gap: 8px;
    background: var(--gray-100); border-radius: 10px;
    padding: 9px 12px;
  }
  .search-icon { font-size: 16px; color: var(--gray-500); }
  .search-input {
    flex: 1; border: none; background: none; outline: none;
    font-size: 14px; font-family: var(--font); color: var(--gray-900);
  }
  .search-input::placeholder { color: var(--gray-400); }
  .search-clear { font-size: 14px; color: var(--gray-400); cursor: pointer; padding: 2px; }

  /* Tabs */
  .tabs { display: flex; padding: 0; gap: 0; background: #fff; border-bottom: 1px solid var(--gray-200); flex-shrink: 0; }
  .tab {
    flex: 1; padding: 10px 8px; border: none; background: none; cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--gray-500);
    border-bottom: 2px solid transparent; transition: all .15s;
    text-align: center;
  }
  .tab.active { border-bottom-color: var(--teal); }
  .tab.tab-logo:first-child.active { border-bottom-color: #e53e3e; }
  .tab.tab-logo:last-child.active { border-bottom-color: #7b2c2c; }

  /* Category chips */
  .chips-row { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
  .chips-row::-webkit-scrollbar { display: none; }
  .chip {
    padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--gray-300);
    background: #fff; font-size: 12px; font-weight: 500; color: var(--gray-600);
    white-space: nowrap; cursor: pointer; transition: all .15s; flex-shrink: 0;
  }
  .chip.active { background: var(--teal); border-color: var(--teal); color: #fff; }

  /* Product list */
  .product-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .product-card {
    margin: 4px 12px; background: #fff; border-radius: var(--radius);
    box-shadow: var(--shadow-sm); cursor: pointer; overflow: hidden;
    transition: transform .12s, box-shadow .12s;
    border: 1.5px solid var(--gray-200);
    display: flex; align-items: stretch;
  }
  .product-card:active { transform: scale(.98); }
  .product-card-accent {
    width: 4px; flex-shrink: 0;
  }
  .product-card-body { padding: 12px 12px 12px 10px; flex: 1; min-width: 0; }
  .product-id { font-size: 11px; font-family: var(--mono); color: var(--gray-500); margin-bottom: 3px; }
  .product-desc { font-size: 13px; font-weight: 600; color: var(--gray-900); line-height: 1.3; margin-bottom: 6px; }
  .product-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .product-grupo { font-size: 10px; color: var(--gray-500); background: var(--gray-100); padding: 2px 7px; border-radius: 4px; }
  .product-price { font-size: 15px; font-weight: 700; color: var(--teal-dark); }
  .product-lista { font-size: 11px; color: var(--gray-400); text-decoration: line-through; margin-left: 4px; }
  .stock-badge {
    font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
    margin-left: auto;
  }
  .stock-ok { background: var(--green-light); color: var(--green); }
  .stock-low { background: var(--amber-light); color: var(--amber); }
  .stock-zero { background: var(--red-light); color: var(--red); }
  .product-card-right { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; padding: 12px 10px 12px 0; }
  .btn-add-cart {
    width: 30px; height: 30px; border-radius: 50%; border: none;
    background: var(--teal); color: #fff; font-size: 18px; font-weight: 300;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 2px 8px rgba(26,122,120,.3);
    transition: transform .12s, background .12s;
  }
  .btn-add-cart:active { transform: scale(.9); background: var(--teal-dark); }

  /* Section headers */
  .section-header { padding: 14px 16px 6px; font-size: 11px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 1px; }

  /* Detail screen */
  .detail-hero { background: var(--teal); padding: 20px 16px 24px; }
  .detail-marca { font-size: 11px; font-weight: 600; color: rgba(255,255,255,.6); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
  .detail-desc { font-size: 18px; font-weight: 700; color: #fff; line-height: 1.3; margin-bottom: 8px; }
  .detail-id { font-size: 12px; font-family: var(--mono); color: rgba(255,255,255,.7); }
  .detail-body { padding: 16px; flex: 1; overflow-y: auto; }
  .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--gray-100); }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { font-size: 13px; color: var(--gray-500); }
  .detail-value { font-size: 13px; font-weight: 600; color: var(--gray-900); }
  .detail-price-card { background: var(--teal-light); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .detail-price-main { font-size: 28px; font-weight: 700; color: var(--teal-dark); }
  .detail-price-label { font-size: 12px; color: var(--teal-mid); margin-bottom: 4px; }
  .detail-price-lista { font-size: 13px; color: var(--gray-500); }
  .detail-price-desc { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

  /* Quantity selector */
  .qty-row { display: flex; align-items: center; gap: 0; background: var(--gray-100); border-radius: 10px; overflow: hidden; }
  .qty-btn { width: 40px; height: 40px; border: none; background: none; font-size: 20px; color: var(--teal); cursor: pointer; font-weight: 300; display: flex; align-items: center; justify-content: center; }
  .qty-val { flex: 1; text-align: center; font-size: 16px; font-weight: 700; color: var(--gray-900); }

  /* Cart / cotizacion */
  .cart-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 40px; }
  .cart-empty-icon { font-size: 52px; opacity: .3; }
  .cart-empty-text { font-size: 14px; color: var(--gray-400); text-align: center; }

  .cart-item { background: #fff; margin: 4px 12px; border-radius: var(--radius); box-shadow: var(--shadow-sm); border: 1.5px solid var(--gray-200); padding: 12px; }
  .cart-item-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .cart-item-desc { font-size: 13px; font-weight: 600; color: var(--gray-900); flex: 1; margin-right: 8px; line-height: 1.3; }
  .cart-item-del { font-size: 18px; color: var(--gray-300); cursor: pointer; padding: 2px; flex-shrink: 0; }
  .cart-item-bottom { display: flex; align-items: center; gap: 8px; }
  .cart-item-price { font-size: 14px; font-weight: 700; color: var(--teal-dark); margin-left: auto; }

  .margin-section { background: #fff; border-radius: var(--radius); margin: 0 12px 8px; padding: 14px; box-shadow: var(--shadow-sm); border: 1.5px solid var(--gray-200); }
  .margin-title { font-size: 12px; font-weight: 700; color: var(--gray-700); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }
  .margin-slider-row { display: flex; align-items: center; gap: 10px; }
  .margin-slider { flex: 1; accent-color: var(--teal); cursor: pointer; height: 4px; }
  .margin-val { font-size: 20px; font-weight: 700; color: var(--teal); min-width: 44px; text-align: right; }
  .margin-info { display: flex; justify-content: space-between; margin-top: 8px; }
  .margin-info-item { font-size: 11px; color: var(--gray-500); }
  .margin-info-val { font-weight: 600; color: var(--gray-800); }

  .totals-card { background: var(--teal); border-radius: var(--radius-lg); margin: 0 12px 12px; padding: 16px; }
  .totals-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .totals-label { font-size: 13px; color: rgba(255,255,255,.7); }
  .totals-val { font-size: 13px; font-weight: 600; color: #fff; }
  .totals-total { font-size: 22px; font-weight: 700; color: #fff; border-top: 1px solid rgba(255,255,255,.2); padding-top: 10px; margin-top: 6px; display: flex; justify-content: space-between; align-items: center; }

  /* Buttons */
  .btn-primary {
    background: var(--teal); color: #fff; border: none;
    border-radius: 12px; padding: 14px 20px;
    font-size: 15px; font-weight: 700; font-family: var(--font);
    cursor: pointer; width: 100%;
    box-shadow: 0 4px 16px rgba(26,122,120,.35);
    transition: transform .12s, background .12s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-primary:active { transform: scale(.97); background: var(--teal-dark); }
  .btn-secondary {
    background: var(--gray-100); color: var(--gray-700); border: none;
    border-radius: 12px; padding: 13px 20px;
    font-size: 14px; font-weight: 600; font-family: var(--font);
    cursor: pointer; width: 100%; transition: background .15s;
  }
  .btn-secondary:active { background: var(--gray-200); }
  .btn-row { display: flex; gap: 8px; padding: 12px; flex-shrink: 0; }

  /* Cross-reference */
  .xref-card { background: #fff; margin: 4px 12px; border-radius: var(--radius); box-shadow: var(--shadow-sm); border: 1.5px solid var(--gray-200); padding: 14px; cursor: pointer; transition: transform .12s; }
  .xref-card:active { transform: scale(.98); }
  .xref-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .xref-competidor { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 6px; background: var(--amber-light); color: var(--amber); text-transform: uppercase; letter-spacing: .8px; }
  .xref-ref { font-size: 12px; font-family: var(--mono); color: var(--gray-600); }
  .xref-desc { font-size: 13px; font-weight: 600; color: var(--gray-900); margin-bottom: 6px; }
  .xref-arrow { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--gray-500); }
  .xref-equiv { font-size: 12px; font-weight: 600; color: var(--teal); font-family: var(--mono); }

  /* Backorders */
  .bo-card { background: #fff; margin: 4px 12px; border-radius: var(--radius); box-shadow: var(--shadow-sm); border: 1.5px solid var(--gray-200); padding: 14px; }
  .bo-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .bo-id { font-size: 11px; font-family: var(--mono); color: var(--gray-400); }
  .bo-status { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
  .bo-pendiente { background: var(--amber-light); color: var(--amber); }
  .bo-en_camino { background: var(--teal-light); color: var(--teal); }
  .bo-llegado { background: var(--green-light); color: var(--green); }
  .bo-desc { font-size: 13px; font-weight: 600; color: var(--gray-900); margin-bottom: 4px; }
  .bo-meta { font-size: 12px; color: var(--gray-500); }

  /* Quote success */
  .success-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; gap: 16px; }
  .success-icon { font-size: 60px; }
  .success-title { font-size: 22px; font-weight: 700; color: var(--teal-dark); text-align: center; }
  .success-sub { font-size: 14px; color: var(--gray-500); text-align: center; line-height: 1.5; }
  .success-ref { font-family: var(--mono); font-size: 12px; color: var(--teal); background: var(--teal-light); padding: 6px 16px; border-radius: 8px; }

  /* Notification dot */
  .notif-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); position: absolute; top: 6px; right: 6px; }

  /* Scrollbars */
  .product-list::-webkit-scrollbar, .detail-body::-webkit-scrollbar { width: 3px; }
  .product-list::-webkit-scrollbar-track, .detail-body::-webkit-scrollbar-track { background: transparent; }
  .product-list::-webkit-scrollbar-thumb, .detail-body::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 2px; }

  /* PDF preview */
  .pdf-preview { flex: 1; overflow-y: auto; background: #e8e8e8; padding: 16px 12px; }
  .pdf-doc {
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 2px 16px rgba(0,0,0,.18), 0 1px 4px rgba(0,0,0,.1);
    /* carta: 216×279mm — escalado a ~340px ancho en móvil */
    width: 100%;
    aspect-ratio: 216 / 279;
    padding: 28px 24px 22px;
    display: flex; flex-direction: column;
    font-size: 9px;
    position: relative;
    overflow: hidden;
  }
  /* Franja superior decorativa */
  .pdf-top-bar { height: 6px; background: var(--teal); border-radius: 2px 2px 0 0; position: absolute; top: 0; left: 0; right: 0; }
  .pdf-header { display: flex; justify-content: space-between; align-items: flex-start; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1.5px solid var(--teal); }
  .pdf-logo-area { display: flex; flex-direction: column; gap: 3px; }
  .pdf-company { font-size: 8px; font-weight: 700; color: var(--teal-dark); text-transform: uppercase; letter-spacing: 1.2px; margin-top: 3px; }
  .pdf-company-sub { font-size: 7px; color: var(--gray-400); letter-spacing: .5px; }
  .pdf-meta { text-align: right; font-size: 8px; color: var(--gray-500); line-height: 1.8; }
  .pdf-folio { font-size: 10px; font-weight: 800; color: var(--teal-dark); letter-spacing: .5px; }
  .pdf-section-title { font-size: 7.5px; font-weight: 700; color: var(--teal); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
  .pdf-client-box {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px;
    background: var(--gray-50); border-radius: 5px;
    padding: 8px 10px; margin-bottom: 10px;
    font-size: 8px; color: var(--gray-600); line-height: 1.7;
    border-left: 3px solid var(--teal);
  }
  .pdf-client-label { font-size: 7px; text-transform: uppercase; letter-spacing: .8px; color: var(--gray-400); font-weight: 700; }
  .pdf-client-val { font-size: 9px; font-weight: 600; color: var(--gray-900); }
  .pdf-table { width: 100%; font-size: 8px; border-collapse: collapse; margin-bottom: 8px; flex: 1; }
  .pdf-table th { background: var(--teal); color: #fff; padding: 5px 6px; text-align: left; font-size: 7px; text-transform: uppercase; letter-spacing: .6px; font-weight: 700; }
  .pdf-table th:last-child, .pdf-table th:nth-last-child(2) { text-align: right; }
  .pdf-table td { padding: 5px 6px; border-bottom: 1px solid var(--gray-100); color: var(--gray-700); vertical-align: middle; line-height: 1.3; }
  .pdf-table td:last-child, .pdf-table td:nth-last-child(2) { text-align: right; white-space: nowrap; }
  .pdf-table tr:nth-child(even) td { background: #fafafa; }
  .pdf-table tr:last-child td { border-bottom: none; }
  .pdf-bottom { display: flex; gap: 10px; align-items: flex-start; margin-top: 6px; }
  .pdf-entrega-box { flex: 1; background: var(--teal-light); border-radius: 5px; padding: 7px 9px; border-left: 3px solid var(--teal); }
  .pdf-entrega-label { font-size: 7px; font-weight: 700; color: var(--teal); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 2px; }
  .pdf-entrega-val { font-size: 9px; font-weight: 600; color: var(--teal-dark); }
  .pdf-totals { min-width: 130px; background: var(--gray-50); border-radius: 5px; padding: 7px 9px; }
  .pdf-total-row { display: flex; justify-content: space-between; font-size: 8px; color: var(--gray-500); margin-bottom: 3px; gap: 12px; }
  .pdf-total-row span:last-child { font-weight: 500; color: var(--gray-700); }
  .pdf-grand { display: flex; justify-content: space-between; font-size: 11px; font-weight: 800; color: var(--teal-dark); border-top: 1.5px solid var(--teal); padding-top: 5px; margin-top: 4px; gap: 12px; }
  .pdf-footer { text-align: center; font-size: 7px; color: var(--gray-400); margin-top: 8px; padding-top: 7px; border-top: 1px solid var(--gray-100); line-height: 1.6; }
  .pdf-footer-bar { height: 4px; background: linear-gradient(90deg, var(--teal), var(--teal-mid)); border-radius: 0 0 2px 2px; position: absolute; bottom: 0; left: 0; right: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useMemo, useRef, useEffect } = React;

// ─── Logo SVG (teal AM/MEGA wordmark)
function AmmegaLogo({ height = 24 }) {
  return (
    <svg height={height} viewBox="0 0 120 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <text x="0" y="28" fontFamily="DM Sans, sans-serif" fontWeight="800" fontSize="28" fill="#1a7a78">AM</text>

    </svg>

}

// ─── Stock badge
function StockBadge({ stock, unidad }) {
  if (stock === 0) return <span className="stock-badge stock-zero">Sin stock</span>;
  if (stock < 10) return <span className="stock-badge stock-low">{stock} {unidad}</span>;
  return <span className="stock-badge stock-ok">{stock} {unidad}</span>;
}

// ─── Format currency
const fmt = (n) => `$${Number(n).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

// ─── Precio efectivo de un item del carrito (soporta bandas métricas)
const calcItemPrecio = (item) => {
  if (item.product.esBandaMetrica && item.ancho) {
    return item.product.precioBinasa * (item.ancho / 25.4) * item.qty;
  }
  return item.product.precioBinasa * item.qty;
};

// ─── PRODUCT DETAIL
function DetailScreen({ product: p, onBack, onAddToCart }) {
  const [qty, setQty] = useState(1);
  const [ancho, setAncho] = useState(p.esBandaMetrica && p.anchoOpciones ? p.anchoOpciones[0] : null);
  const [anchoUnidad, setAnchoUnidad] = useState('mm');
  const [anchoCustom, setAnchoCustom] = useState('');
  const accentColor = p.marca === 'Megadyne' ? 'var(--teal)' : 'var(--amber)';
  const descuento = Math.round((1 - p.precioBinasa / p.precioLista) * 100);

  const anchofinal = anchoCustom ? Number(anchoCustom) : ancho;
  const precioConAncho = p.esBandaMetrica && anchofinal
    ? p.precioBinasa * (anchoUnidad === 'in' ? anchofinal * 25.4 / 25.4 : anchofinal / 25.4)
    : p.precioBinasa;

  return (
    <div className="screen">
      <div className="topbar" style={{ background: accentColor }}>
        <button className="topbar-back" onClick={onBack} style={{ background: 'rgba(255,255,255,.2)', color: '#fff' }}>‹</button>

          <div className="topbar-title" style={{ color: '#fff' }}>Detalle</div>
          <div className="topbar-sub" style={{ color: 'rgba(255,255,255,.7)' }}>{p.marca}</div>
        </div>
      </div>

      <div className="detail-hero" style={{ background: accentColor }}>
        <div className="detail-marca">{p.marca} · {p.categoria}</div>
        <div className="detail-desc">{p.desc}</div>
        <div className="detail-id">SKU: {p.id}</div>
      </div>

      <div className="detail-body">
        {/* Price card */}
        <div className="detail-price-card" style={{ background: p.marca === 'Megadyne' ? 'var(--teal-light)' : '#fef3c7' }}>
          <div className="detail-price-label">Precio Binasa</div>
          <div className="detail-price-main" style={{ color: p.marca === 'Megadyne' ? 'var(--teal-dark)' : 'var(--amber)' }}>
            {p.esBandaMetrica && anchofinal
              ? <>{fmt(precioConAncho)} <span style={{ fontSize: 14, fontWeight: 400 }}>/ pz ({anchofinal}{anchoUnidad} ancho)</span></>
              : <>{fmt(p.precioBinasa)} <span style={{ fontSize: 14, fontWeight: 400 }}>/ {p.unidad}</span></>
            }
          </div>
          <div className="detail-price-lista">P. Lista: {fmt(p.precioLista)} · Descuento {descuento}%</div>
          <div className="detail-price-desc">Precio base. Agrega margen al cotizar.</div>
        </div>

        {/* Selector de ancho para bandas métricas */}
        {p.esBandaMetrica && (
          <div style={{ background: '#fff', border: '1.5px solid var(--teal)', borderRadius: 12, padding: '14px', marginBottom: 4 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--teal-dark)', marginBottom: 4 }}>
              Paso {p.paso} · {p.longitud}mm longitud
            </div>
            <div style={{ fontSize: 11, color: 'var(--gray-500)', marginBottom: 10 }}>Selecciona el ancho del corte</div>

            {/* Botones anchos estándar */}
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 10 }}>
              {p.anchoOpciones && p.anchoOpciones.map(a => (
                <button key={a}
                  onClick={() => { setAncho(a); setAnchoCustom(''); setAnchoUnidad('mm'); }}
                  style={{
                    padding: '7px 14px', borderRadius: 8, border: '1.5px solid',
                    borderColor: ancho === a && !anchoCustom ? 'var(--teal)' : 'var(--gray-200)',
                    background: ancho === a && !anchoCustom ? 'var(--teal)' : 'var(--gray-50)',
                    color: ancho === a && !anchoCustom ? '#fff' : 'var(--gray-700)',
                    fontSize: 13, fontWeight: 700, cursor: 'pointer', transition: 'all .12s',
                    minWidth: 56, textAlign: 'center'
                  }}
                >{a}<span style={{ fontSize: 10, fontWeight: 400, marginLeft: 2 }}>mm</span></button>
              ))}
            </div>

            {/* Input libre + unidad */}
            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              <div style={{ flex: 1, display: 'flex', alignItems: 'center', background: 'var(--gray-100)', borderRadius: 8, padding: '0 10px', border: anchoCustom ? '1.5px solid var(--teal)' : '1.5px solid transparent' }}>
                <input
                  type="number" min="1" placeholder="Ancho personalizado…"
                  value={anchoCustom}
                  onChange={e => { setAnchoCustom(e.target.value); setAncho(null); }}
                  style={{ flex: 1, border: 'none', background: 'none', outline: 'none', fontSize: 13, padding: '9px 0', fontFamily: 'var(--font)' }}
                />
                <select
                  value={anchoUnidad}
                  onChange={e => setAnchoUnidad(e.target.value)}
                  style={{ border: 'none', background: 'none', fontSize: 12, fontWeight: 600, color: 'var(--teal)', cursor: 'pointer', outline: 'none', padding: '0 2px' }}
                >
                  <option value="mm">mm</option>
                  <option value="in">pulg</option>
                </select>
              </div>
            </div>

            {anchofinal > 0 && (
              <div style={{ marginTop: 10, display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: 'var(--teal-light)', borderRadius: 8, padding: '8px 12px' }}>

              </div>
            )}

        <div className="detail-row">
          <span className="detail-label">Grupo</span>
          <span className="detail-value">{p.grupo}</span>
        </div>
        <div className="detail-row">
          <span className="detail-label">Cantidad</span>
          <div className="qty-row">
            <button className="qty-btn" onClick={() => setQty(q => Math.max(1, q - 1))}>−</button>
            <span className="qty-val">{qty}</span>
            <button className="qty-btn" onClick={() => setQty(q => q + 1)}>+</button>
          </div>
        </div>

        {p.stock === 0 && (
          <div style={{ background: 'var(--red-light)', borderRadius: 10, padding: '12px 14px', marginTop: 12 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--red)', marginBottom: 4 }}>Sin stock disponible</div>
            <div style={{ fontSize: 12, color: '#991b1b' }}>Puedes solicitar un back-order y te notificamos cuando llegue.</div>
          </div>
        )}
      </div>

      <div className="btn-row" style={{ flexDirection: 'column', gap: 8 }}>
        <button
          className="btn-primary"
          style={{ background: p.esBandaMetrica && !anchofinal ? 'var(--gray-300)' : accentColor }}
          disabled={p.esBandaMetrica && !anchofinal}
          onClick={() => onAddToCart(p, qty, anchofinal, anchoUnidad)}
        >
          {p.esBandaMetrica && !anchofinal
            ? 'Selecciona el ancho primero'
            : p.stock > 0
              ? `+ Agregar ${qty} pz a cotización`
              : '📦 Solicitar back-order'
          }
        </button>
      </div>
    </div>
  );
}

            <span className="margin-val">{margin}%</span>
          </div>
          <div className="margin-info">
            <span className="margin-info-item">Costo: <span className="margin-info-val">{fmt(subtotal)}</span></span>
            <span className="margin-info-item">Utilidad: <span className="margin-info-val">{fmt(withMargin - subtotal)}</span></span>
          </div>
        </div>

        <div className="totals-card">
          <div className="totals-row">
            <span className="totals-label">Subtotal</span>
            <span className="totals-val">{fmt(withMargin)}</span>
          </div>
          <div className="totals-row">
            <span className="totals-label">IVA 16%</span>
            <span className="totals-val">{fmt(iva)}</span>
          </div>
          <div className="totals-total">
            <span>Total</span>
            <span>{fmt(total)}</span>
          </div>
        </div>

        <div style={{ height: 8 }} />
      </div>

      <div className="btn-row">
        <button className="btn-primary" onClick={() => onGenerate({ margin, clientName, clientEmpresa, entrega, subtotal, withMargin, iva, total })}>
          📄 Generar PDF
        </button>
      </div>
    </div>
  );
}

// ─── CROSS REFERENCE
function XRefScreen({ onBack, onProduct }) {
  const [search, setSearch] = useState('');
  const items = window.EQUIVALENCIAS.filter(e => {
    const q = search.toLowerCase();
    return !q || e.ref.toLowerCase().includes(q) || e.competidor.toLowerCase().includes(q) || e.descripcion.toLowerCase().includes(q);
  });

  return (
    <div className="screen">
      <div className="topbar">
        <button className="topbar-back" onClick={onBack}>‹</button>
        <div>
          <div className="topbar-title">Equivalencias</div>
          <div className="topbar-sub">Gates · Optibelt · Parker</div>
        </div>
      </div>

      <div className="search-wrap">
        <div className="search-bar">
          <span className="search-icon">🔍</span>
          <input className="search-input" placeholder="Buscar referencia competidor…" value={search} onChange={e => setSearch(e.target.value)} />
          {search && <span className="search-clear" onClick={() => setSearch('')}>✕</span>}
        </div>
      </div>

      <div className="section-header">Referencias cruzadas ({items.length})</div>
      <div className="product-list">
        {items.map((e, i) => {
          const prod = [...window.CATALOG.bandas, ...window.CATALOG.mangueras].find(p => p.id === e.equivalente);
          return (
            <div key={i} className="xref-card" onClick={() => prod && onProduct(prod)}>
              <div className="xref-top">
                <span className="xref-competidor">{e.competidor}</span>
                <span className="xref-ref">{e.ref}</span>
              </div>
              <div className="xref-desc">{e.descripcion}</div>
              <div className="xref-arrow">
                <span>Equivale a</span>
                <span>→</span>
                <span className="xref-equiv">{e.equivalente}</span>
                <span style={{ fontSize: 11, color: 'var(--gray-500)' }}>({e.marca})</span>
                {prod && <span style={{ marginLeft: 'auto', fontSize: 13, fontWeight: 700, color: 'var(--teal-dark)' }}>{fmt(prod.precioBinasa)}</span>}
              </div>
            </div>
          );
        })}

        <div style={{ padding: '16px 12px', textAlign: 'center' }}>
          <button style={{ background: 'var(--teal-light)', color: 'var(--teal)', border: 'none', borderRadius: 10, padding: '10px 20px', fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>
            + Agregar equivalencia
          </button>

      </div>
    </div>
  );
}

// ─── MAIN APP
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "darkMode": false,
  "accentColor": "#1a7a78",
  "showMarco": false,
  "fontSize": 13
}/*EDITMODE-END*/;

function App() {
  const [screen, setScreen] = useState('home');
  const [prevScreen, setPrevScreen] = useState(null);
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [cart, setCart] = useState([]);
  const [quoteData, setQuoteData] = useState(null);
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

  const navigate = useCallback((to, data = null) => {
    setPrevScreen(screen);
    if (to === 'detail') setSelectedProduct(data);
    setScreen(to);
  }, [screen]);

  const goBack = useCallback(() => {
    setScreen(prevScreen || 'home');
    setPrevScreen(null);
  }, [prevScreen]);

  const addToCart = useCallback((product, qty = 1, ancho = null, anchoUnidad = 'mm') => {
    setCart(prev => {
      const existing = prev.find(i => i.product.id === product.id);
      if (existing) return prev.map(i => i.product.id === product.id ? { ...i, qty: i.qty + qty, ancho: ancho || i.ancho, anchoUnidad: anchoUnidad || i.anchoUnidad } : i);
      return [...prev, { product, qty, ancho, anchoUnidad }];
    });
    if (screen !== 'cart') setScreen('catalog');
  }, [screen]);

  const removeFromCart = useCallback((id) => {
    setCart(prev => prev.filter(i => i.product.id !== id));
  }, []);

  const changeQty = useCallback((id, qty) => {
    setCart(prev => prev.map(i => i.product.id === id ? { ...i, qty } : i));
  }, []);

  const changeAncho = useCallback((id, ancho, anchoUnidad) => {
    setCart(prev => prev.map(i => i.product.id === id ? { ...i, ancho, anchoUnidad } : i));
  }, []);

  const generatePdf = useCallback((data) => {
    setQuoteData(data);
    setScreen('pdf');
  }, []);

  const renderScreen = () => {
    switch (screen) {
      case 'home': return <HomeScreen onNav={navigate} cart={cart} />;
      case 'catalog': return <CatalogScreen onBack={() => setScreen('home')} onProduct={(p, dest) => dest ? setScreen(dest) : navigate('detail', p)} onAddToCart={addToCart} cart={cart} />;
      case 'detail': return selectedProduct ? <DetailScreen product={selectedProduct} onBack={goBack} onAddToCart={(p, qty, ancho, anchoUnidad) => { addToCart(p, qty, ancho, anchoUnidad); goBack(); }} /> : null;
      case 'cart': return <CartScreen cart={cart} onBack={() => setScreen('home')} onRemove={removeFromCart} onChangeQty={changeQty} onGenerate={generatePdf} />;
      case 'pdf': return <PdfScreen cart={cart} quoteData={quoteData} onBack={() => setScreen('cart')} onDone={() => setScreen('success')} />;
      case 'success': return <SuccessScreen onDone={() => { setCart([]); setScreen('home'); }} />;
      case 'xref': return <XRefScreen onBack={() => setScreen('home')} onProduct={(p) => navigate('detail', p)} />;
      case 'backorders': return <BackordersScreen onBack={() => setScreen('home')} />;
      default: return null;
    }
  };

  // Apply accent color tweak to CSS variable
  useEffect(() => {
    document.documentElement.style.setProperty('--teal', tweaks.accentColor);
    // Derive dark from accent
    document.documentElement.style.setProperty('--teal-dark', tweaks.accentColor);
  }, [tweaks.accentColor]);

  const AppContent = (
    <div style={{ fontSize: tweaks.fontSize }}>
      {renderScreen()}
    </div>
  );

  return (
    <div className="app-bg">
      {tweaks.showMarco ? (
        <IOSDevice>
          {AppContent}
        </IOSDevice>
      ) : (
        <div style={{ width: 390, height: 844, overflow: 'hidden', borderRadius: 40, boxShadow: '0 40px 80px rgba(0,0,0,.5)' }}>
          {AppContent}
        </div>
      )}
      <div className="brand-watermark">Ammega Binasa · Cotizador B2B</div>
      <TweaksPanel>
        <TweakSection label="Marco" />
        <TweakToggle label="iPhone frame" value={tweaks.showMarco} onChange={v => setTweak('showMarco', v)} />
        <TweakSection label="Texto" />
        <TweakSlider label="Tamaño fuente" value={tweaks.fontSize} min={12} max={17} step={1} unit="px" onChange={v => setTweak('fontSize', v)} />
        <TweakSection label="Color acento" />
        <TweakColor label="Color principal" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
