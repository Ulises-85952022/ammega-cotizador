<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Cotizador — Jason de Mexico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#EAECEE;
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px 16px;
  gap:0;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.wrap{width:100%;max-width:400px;display:flex;flex-direction:column;gap:12px;animation:fadeUp .4s ease}

/* ── Logo Card ── */
.logo-card{
  background:#005762;
  border-radius:16px;
  padding:28px 24px 24px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.logo-card::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:140px;height:140px;border-radius:50%;
  background:rgba(255,255,255,.04);
}
.logo-card::after{
  content:'';position:absolute;bottom:-30px;left:-30px;
  width:100px;height:100px;border-radius:50%;
  background:rgba(255,255,255,.03);
}
.logo-img{height:56px;max-width:220px;object-fit:contain;margin-bottom:10px}
.logo-text-main{
  font-size:26px;font-weight:900;color:#fff;
  letter-spacing:2px;line-height:1;
  font-family:'Inter',sans-serif;
}
.logo-text-main span{font-size:13px;font-weight:600;letter-spacing:4px;opacity:.7;display:block}
.logo-subtitle{
  font-size:10px;font-weight:700;color:rgba(230,252,255,.6);
  letter-spacing:3px;text-transform:uppercase;margin-top:8px;
}

/* ── Selector Cards ── */
.selector-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sel-card{
  background:#fff;
  border-radius:14px;
  padding:22px 16px;
  text-align:center;
  cursor:pointer;
  border:2px solid transparent;
  transition:border-color .15s, transform .12s, box-shadow .15s;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
  text-decoration:none;
  display:block;
}
.sel-card:hover{border-color:#005762;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,87,98,.12)}
.sel-card:active{transform:translateY(0)}
.sel-icon{font-size:28px;margin-bottom:8px;display:block}
.sel-label{font-size:15px;font-weight:800;color:#111;letter-spacing:.3px}

/* ── Bottom nav ── */
.bottom-nav{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;
  background:#fff;border-radius:12px;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
  font-size:12px;
}
.nav-user{color:#757575;font-weight:600}
.nav-user span{color:#005762;font-weight:700}
.btn-logout{
  background:none;border:1px solid #ddd;border-radius:6px;
  padding:4px 10px;font-size:11px;color:#999;cursor:pointer;
  font-family:inherit;font-weight:600;transition:all .15s;
}
.btn-logout:hover{border-color:#ef4444;color:#ef4444}

/* extra links for director/admin */
.extra-nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:0}
.ext-link{
  flex:1;padding:10px;background:#fff;border-radius:10px;
  text-align:center;text-decoration:none;font-size:12px;font-weight:700;
  color:#005762;border:1.5px solid #DDDEDF;
  transition:border-color .15s, background .15s;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.ext-link:hover{border-color:#005762;background:#E6FCFF}
</style>
</head>
<body>

<!-- AUTH GUARD -->
<script>
(function(){
  function getSession(){try{return JSON.parse(localStorage.getItem('jdm_session')||'null');}catch{return null;}}
  const s=getSession();
  const allowed=['vendedor','director','admin'];
  if(!s||!allowed.includes(s.role)){localStorage.removeItem('jdm_session');location.href='index.html';}
  else window._session=s;
})();
function logout(){localStorage.removeItem('jdm_session');location.href='index.html';}
</script>

<div class="wrap" id="main-wrap">

  <!-- Logo Card -->
  <div class="logo-card">
    <div id="logo-area">
      <!-- Logo o texto según disponibilidad -->
    </div>
    <div class="logo-subtitle">Jason de Mexico · Cotizador</div>
  </div>

  <!-- Selector de tipo -->
  <div class="selector-grid">
    <a href="cotizador_bandas.html" class="sel-card">
      <span class="sel-icon">⚡</span>
      <span class="sel-label">Bandas</span>
    </a>
    <a href="cotizador_mangueras_tpl.html" class="sel-card">
      <span class="sel-icon">💧</span>
      <span class="sel-label">Mangueras</span>
    </a>
  </div>

  <!-- Links extra (Director / Admin) -->
  <div class="extra-nav" id="extra-nav" style="display:none"></div>

  <!-- Barra inferior: usuario + salir -->
  <div class="bottom-nav">
    <div class="nav-user" id="nav-user-info"></div>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>

</div>

<script>
(function(){
  const s=window._session;
  if(!s)return;

  const ROLE_LABEL={vendedor:'Vendedor',director:'Director',admin:'Admin'};
  document.getElementById('nav-user-info').innerHTML=
    `${s.user} &nbsp;·&nbsp; <span>${ROLE_LABEL[s.role]||s.role}</span>`;

  // Logo: intentar cargar desde localStorage (admin lo puede guardar)
  const logoB64=localStorage.getItem('jdm_logo_b64');
  const logoArea=document.getElementById('logo-area');
  if(logoB64){
    logoArea.innerHTML=`<img class="logo-img" src="data:image/png;base64,${logoB64}" alt="Logo">`;
  } else {
    logoArea.innerHTML=`
      <div class="logo-text-main">AMMEGA<span>GROUP</span></div>`;
  }

  // Links extra para director y admin
  const extraNav=document.getElementById('extra-nav');
  if(s.role==='director'||s.role==='admin'){
    extraNav.style.display='flex';
    let html=`<a href="dashboard.html" class="ext-link">📊 Dashboard</a>`;
    if(s.role==='admin') html+=`<a href="admin.html" class="ext-link">⚙️ Admin</a>`;
    extraNav.innerHTML=html;
  }
})();
</script>
</body>
</html>
