<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jason de Mexico — Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a14;font-family:'Inter',system-ui,sans-serif;color:#ddd;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.login-wrap{width:100%;max-width:420px;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.brand{text-align:center;margin-bottom:28px}
.brand-logo{font-size:26px;font-weight:900;color:#38bdf8;letter-spacing:2px}
.brand-sub{font-size:10px;color:#475569;letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.card{background:#111122;border:1px solid #1e1e38;border-radius:16px;padding:28px 24px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#38bdf8,#818cf8)}
.card-title{font-size:11px;font-weight:700;color:#475569;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;text-align:center}
.field{margin-bottom:16px}
.field label{display:block;font-size:10px;font-weight:700;color:#475569;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.inp{background:#0d0d1a;border:1.5px solid #1e293b;border-radius:8px;padding:11px 14px;color:#ddd;width:100%;outline:none;font-size:15px;font-family:inherit;transition:border-color .15s}
.inp:focus{border-color:#38bdf8}
.inp::placeholder{color:#334155}
.btn-login{width:100%;padding:13px;background:#38bdf8;color:#0a0a15;border:none;border-radius:8px;font-weight:800;font-size:15px;cursor:pointer;margin-top:4px;font-family:inherit;transition:background .15s}
.btn-login:hover{background:#7dd3fc}
.err-msg{color:#f87171;font-size:13px;margin-top:10px;min-height:18px;text-align:center}
.setup-note{background:#1a1200;border:1px solid #92400e;border-radius:8px;padding:12px 14px;font-size:12px;color:#fbbf24;line-height:1.6;margin-bottom:16px}
.setup-note strong{display:block;margin-bottom:4px;font-size:10px;letter-spacing:1px;text-transform:uppercase}
.btn-create{width:100%;padding:12px;background:#f0b429;color:#0a0a15;border:none;border-radius:8px;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-create:hover{background:#fbbf24}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-logo">JASON DE MEXICO</div>
    <div class="brand-sub">Sistema de Cotizaciones</div>
  </div>
  <div class="card">

    <!-- Login normal -->
    <div id="login-form">
      <div class="card-title">Iniciar Sesion</div>
      <div class="field">
        <label>Usuario</label>
        <input class="inp" id="login-user" type="text" placeholder="usuario" autocomplete="username">
      </div>
      <div class="field">
        <label>Contrasena</label>
        <input class="inp" id="login-pass" type="password" placeholder="......" autocomplete="current-password">
      </div>
      <button class="btn-login" onclick="doLogin()">Entrar</button>
      <div class="err-msg" id="login-err"></div>
    </div>

    <!-- Primera vez: no hay usuarios -->
    <div id="setup-form" style="display:none">
      <div class="card-title">Configuracion Inicial</div>
      <div class="setup-note">
        <strong>Primera vez</strong>
        No hay usuarios registrados. Crea el primer administrador para comenzar.
      </div>
      <div class="field">
        <label>Nombre de usuario</label>
        <input class="inp" id="setup-user" type="text" placeholder="admin">
      </div>
      <div class="field">
        <label>Contrasena</label>
        <input class="inp" id="setup-pass" type="password" placeholder="minimo 4 caracteres">
      </div>
      <div class="field">
        <label>Confirmar contrasena</label>
        <input class="inp" id="setup-pass2" type="password" placeholder="......">
      </div>
      <button class="btn-create" onclick="doSetup()">Crear Administrador</button>
      <div class="err-msg" id="setup-err"></div>
    </div>

  </div>
</div>

<script>
async function hashPass(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function getUsers(){try{return JSON.parse(localStorage.getItem('jdm_users')||'[]');}catch{return[];}}
function saveUsers(u){localStorage.setItem('jdm_users',JSON.stringify(u));}
function setSession(user,role){localStorage.setItem('jdm_session',JSON.stringify({user,role,loginAt:new Date().toISOString()}));}
function redirectByRole(role){
  if(role==='admin')         location.href='admin.html';
  else if(role==='director') location.href='dashboard.html';
  else                       location.href='cotizador_tpl.html';
}

async function doLogin(){
  const user=document.getElementById('login-user').value.trim().toLowerCase();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-err');
  err.textContent='';
  if(!user||!pass){err.textContent='Ingresa usuario y contrasena';return;}
  const h=await hashPass(pass);
  const found=getUsers().find(u=>u.user===user&&u.passHash===h);
  if(!found){err.textContent='Usuario o contrasena incorrectos';return;}
  // Reseller: guardar info en localStorage y redirigir al cotizador
  if(found.role==='reseller'){
    try{
      const resellers=JSON.parse(localStorage.getItem('jdm_resellers')||'[]');
      const ri=resellers.find(r=>r.user===user);
      if(ri){
        localStorage.setItem('jdm_reseller_user',user);
        localStorage.setItem('jdm_reseller_nombre',ri.nombre);
        localStorage.setItem('jdm_reseller_discount',String(ri.descuento));
        localStorage.setItem('jdm_reseller_logo',ri.logo||'');
      }
    }catch{}
    location.href='cotizador_tpl.html';
    return;
  }
  setSession(found.user,found.role);
  redirectByRole(found.role);
}

async function doSetup(){
  const user=document.getElementById('setup-user').value.trim().toLowerCase();
  const pass=document.getElementById('setup-pass').value;
  const pass2=document.getElementById('setup-pass2').value;
  const err=document.getElementById('setup-err');
  err.textContent='';
  if(!user||!pass){err.textContent='Completa todos los campos';return;}
  if(pass.length<4){err.textContent='Minimo 4 caracteres';return;}
  if(pass!==pass2){err.textContent='Las contrasenas no coinciden';return;}
  const h=await hashPass(pass);
  saveUsers([{user,passHash:h,role:'admin'}]);
  setSession(user,'admin');
  location.href='admin.html';
}

// Al cargar: si ya hay sesion valida, redirigir
(function(){
  try{
    const s=JSON.parse(localStorage.getItem('jdm_session')||'null');
    if(s&&s.user&&s.role&&getUsers().find(u=>u.user===s.user)){
      redirectByRole(s.role);return;
    }
  }catch{}
  if(!getUsers().length){
    document.getElementById('login-form').style.display='none';
    document.getElementById('setup-form').style.display='block';
  }
})();

document.getElementById('login-user').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('login-pass').focus();});
document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
